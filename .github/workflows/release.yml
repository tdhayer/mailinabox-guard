name: Release Gate & Publishing Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate-and-test:
    name: Validate Tag & Run Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify version synchronization
        run: python tools/version_sync_check.py --tag ${{ github.ref_name }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check .

      - name: Run Ruff Format Check
        run: ruff format --check .

      - name: Run ShellCheck on setup scripts
        uses: ludeeus/action-shellcheck@00cae500b14c8755098a8d386cc62157d472a812 # v2.0.0
        with:
          scandir: './setup'

      - name: Run ShellCheck on management scripts
        uses: ludeeus/action-shellcheck@00cae500b14c8755098a8d386cc62157d472a812 # v2.0.0
        with:
          scandir: './management'

      - name: Compile Python files
        run: python -m py_compile $(find . -name "*.py" -not -path "*/.venv/*")

  publish-release:
    name: Publish GitHub Release
    needs: validate-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Extract Release Notes
        run: python tools/version_sync_check.py --extract-changelog > release_notes.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Mail-in-a-Box Guard ${{ github.ref_name }}" \
            --notes-file release_notes.txt \
            --draft=false \
            --prerelease=false
