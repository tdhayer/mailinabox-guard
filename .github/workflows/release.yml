name: Release Gate & Publishing Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate-and-test:
    name: Validate Tag & Run Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Verify version synchronization
        run: python tools/version_sync_check.py --tag ${{ github.ref_name }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check .

      - name: Run Ruff Core Checks on Management & Tests
        run: ruff check management tests --select F,E9

      - name: Run Ruff Format Check
        run: ruff format --check .

      - name: Run ShellCheck on setup scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: './setup'
          severity: error

      - name: Run ShellCheck on management scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: './management'
          severity: error

      - name: Compile Python files
        run: python -m py_compile $(find . -name "*.py" -not -path "*/.venv/*" -not -path "./tools/mail.py")

      - name: Install test dependencies
        run: |
          pip install pytest rtyaml "email_validator>=1.0.0" flask dnspython python-dateutil expiringdict defusedxml "qrcode[pil]" pyotp "webauthn>=2.7.0" "cbor2<6.0.0" "idna>=2.0.0" "cryptography>=44.0.2" psutil b2sdk boto3

      - name: Run unit tests
        run: python -m pytest

  publish-release:
    name: Publish GitHub Release
    needs: validate-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Extract Release Notes
        run: python tools/version_sync_check.py --extract-changelog > release_notes.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Mail-in-a-Box Guard ${{ github.ref_name }}" \
            --notes-file release_notes.txt \
            --draft=false \
            --prerelease=false
