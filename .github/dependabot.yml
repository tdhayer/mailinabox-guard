version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  # Maintain Python packages
  - package-ecosystem: "pip"
    directory: "/tests"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
