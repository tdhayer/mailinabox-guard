<h2>System Status Checks</h2>

<style>
.summary-error {
  color: var(--error);
  font-weight: 600;
}
.summary-warning {
  color: var(--warning);
  font-weight: 600;
}
.summary-ok {
  color: var(--success);
  font-weight: 600;
}
#system-checks div.extra {
  display: none;
  margin-top: 1em;
  max-width: 50em;
  word-wrap: break-word;
}
#system-checks a.showhide {
  display: none;
  font-size: 0.875rem;
  margin-top: 8px;
  display: inline-block;
}
#system-checks .pre {
  margin: 1em 0;
  font-family: SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  white-space: pre-wrap;
  background-color: var(--bg-app);
  border: 1px solid var(--border-color);
  padding: 12px;
  border-radius: 8px;
  color: var(--text-main);
  font-size: 0.875rem;
}
.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 4px 16px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-right: 8px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  outline: none;
}
.filter-btn:hover {
  background: var(--bg-app);
  color: var(--text-main);
}
.filter-btn.active {
  background: var(--text-main);
  color: var(--bg-card);
  border-color: var(--text-main);
}
.filter-btn-ok.active { background: var(--success); border-color: var(--success); color: white; }
.filter-btn-warning.active { background: var(--warning); border-color: var(--warning); color: white; }
.filter-btn-error.active { background: var(--error); border-color: var(--error); color: white; }
</style>

<div class="row">
	<div class="col-md-push-9 col-md-3">

<div id="system-reboot-required" style="display: none; margin-bottom: 1.5em;" class="panel">
	<h3 style="margin-top: 0 !important; font-size: 1.25rem !important; border-bottom: none !important; padding-bottom: 0 !important; margin-bottom: 12px !important;">System Reboot</h3>
	<div style="margin-bottom: 16px; font-size: 0.9375rem; line-height: 1.6;" class="reboot-msg">No reboot is necessary.</div>
	<button type="button" class="btn btn-danger btn-block" style="width: 100%;" onclick="confirm_reboot(); return false;">Reboot Box</button>
</div>

<div id="system-privacy-setting" style="display: none" class="panel">
	<h3 style="margin-top: 0 !important; font-size: 1.25rem !important; border-bottom: none !important; padding-bottom: 0 !important; margin-bottom: 12px !important;">Privacy Options</h3>
	<div style="margin-bottom: 12px; font-size: 0.9375rem;"><a onclick="return enable_privacy(!current_privacy_setting)" href="#" class="btn btn-default btn-block" style="width: 100%; white-space: normal;"><span>Enable/Disable</span> New-Version Check</a></div>
	<p style="line-height: 1.4; margin-bottom: 0;"><small class="text-muted">(When enabled, status checks phone-home to check for a new release of Mail-in-a-Box.)</small></p>
</div>

	</div> <!-- /col -->
	<div class="col-md-pull-3 col-md-8">

          <div id="system-checks-summary" style="margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 500;">
          </div>

<table id="system-checks" class="table table-condensed" style="max-width: 60em">
  <thead>
  </thead>
  <tbody>
  </tbody>
</table>

	</div> <!-- /col -->
</div> <!-- /row -->

<script>
function show_system_status() {
  const summary = $('#system-checks-summary');
  summary.html("");

  $('#system-checks tbody').html("<tr><td colspan='2' class='text-muted'>Loading...</td></tr>")

  api(
    "/system/privacy",
    "GET",
    { },
    function(r) {
      current_privacy_setting = r;
      $('#system-privacy-setting').show();
      $('#system-privacy-setting a span').text(r ? "Disable" : "Enable");
      $('#system-privacy-setting p').toggle(!r);
    });

  api(
    "/system/reboot",
    "GET",
    { },
    function(r) {
      $('#system-reboot-required').show(); // show when r becomes available
      $('#system-reboot-required').find('button').toggle(r);
      $('#system-reboot-required').find('.reboot-msg').text(r ? "A system reboot is required to apply updates." : "No reboot is necessary.");
    });

  api(
    "/system/status",
    "POST",
    { },
    function(r) {
      $('#system-checks tbody').html("");
      const ok_symbol = "✓";
      const error_symbol = "✖";
      const warning_symbol = "?";

      let count_by_status = { ok: 0, error: 0, warning: 0 };

      for (var i = 0; i < r.length; i++) {
        var n = $("<tr><td class='status'/><td class='message'><p style='margin: 0'/><div class='extra'/><a class='showhide' href='#'/></tr>");
        n.attr('data-status-type', r[i].type);
        if (i == 0) n.addClass('first')
        if (r[i].type == "heading")
                n.addClass(r[i].type)
        else
                n.addClass("status-" + r[i].type)

        if (r[i].type == "ok") {
          n.find('td.status').html($('<span class="status-badge status-badge-ok">✓</span>'));
          count_by_status[r[i].type]++;
        }
        if (r[i].type == "error") {
          n.find('td.status').html($('<span class="status-badge status-badge-error">✖</span>'));
          count_by_status[r[i].type]++;
        }
        if (r[i].type == "warning") {
          n.find('td.status').html($('<span class="status-badge status-badge-warning">?</span>'));
          count_by_status[r[i].type]++;
        }

        n.find('td.message p').text(r[i].text)
        $('#system-checks tbody').append(n);

        if (r[i].extra.length > 0) {
          n.find('a.showhide').show().text("show more").click(function() {
            $(this).hide();
            $(this).parent().find('.extra').fadeIn();
            return false;
          });
        }

        for (var j = 0; j < r[i].extra.length; j++) {

          var m = $("<div/>").text(r[i].extra[j].text)
          if (r[i].extra[j].monospace)
            m.addClass("pre");
          n.find('> td.message > div').append(m);
        }
      }

      // Summary filter buttons
      summary.html("");
      
      let all_btn = $('<button class="filter-btn active" data-filter="all"/>').text(`All Checks (${r.filter(x => x.type !== 'heading').length})`);
      all_btn.click(() => filter_status('all'));
      summary.append(all_btn);

      if (count_by_status['error'] > 0) {
        let err_btn = $('<button class="filter-btn filter-btn-error" data-filter="error"/>').text(`✖ ${count_by_status['error']} Error${count_by_status['error'] > 1 ? 's' : ''}`);
        err_btn.click(() => filter_status('error'));
        summary.append(err_btn);
      }
      if (count_by_status['warning'] > 0) {
        let warn_btn = $('<button class="filter-btn filter-btn-warning" data-filter="warning"/>').text(`? ${count_by_status['warning']} Warning${count_by_status['warning'] > 1 ? 's' : ''}`);
        warn_btn.click(() => filter_status('warning'));
        summary.append(warn_btn);
      }
      if (count_by_status['ok'] > 0) {
        let ok_btn = $('<button class="filter-btn filter-btn-ok" data-filter="ok"/>').text(`✓ ${count_by_status['ok']} OK`);
        ok_btn.click(() => filter_status('ok'));
        summary.append(ok_btn);
      }

      // Default to "error" or "warning" filter if there are any issues
      if (count_by_status['error'] > 0) {
        filter_status('error');
      } else if (count_by_status['warning'] > 0) {
        filter_status('warning');
      }
    })
}

window.filter_status = function(type) {
  $('.filter-btn').removeClass('active');
  $('.filter-btn[data-filter="' + type + '"]').addClass('active');

  if (type === 'all') {
    $('#system-checks tbody tr').show();
    return;
  }

  $('#system-checks tbody tr').hide();
  let current_heading = null;

  $('#system-checks tbody tr').each(function() {
    let row_type = $(this).attr('data-status-type');
    if (row_type === 'heading') {
      current_heading = $(this);
    } else if (row_type === type) {
      if (current_heading) {
        current_heading.show();
        current_heading = null;
      }
      $(this).show();
    }
  });
};

var current_privacy_setting = null;
function enable_privacy(status) {
  api(
    "/system/privacy",
    "POST",
    {
      value: (status ? "private" : "off")
    },
    function(res) {
      show_system_status();
    });
  return false; // disable link
}

function confirm_reboot() {
  show_modal_confirm(
    "Reboot",
    $("<p>This will reboot your Mail-in-a-Box <code>{{hostname}}</code>.</p> <p>Until the machine is fully restarted, your users will not be able to send and receive email, and you will not be able to connect to this control panel or with SSH. The reboot cannot be cancelled.</p>"),
    "Reboot Now",
    function() {
      api(
        "/system/reboot",
        "POST",
        { },
        function(r) {
          var msg = "<p>Please reload this page after a minute or so.</p>";
          if (r) msg = "<p>The reboot command said:</p> <pre>" + $("<pre/>").text(r).html() + "</pre>"; // successful reboots don't produce any output; the output must be HTML-escaped
          show_modal_error("Reboot", msg);
        });
    });
}
</script>
